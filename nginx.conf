server {
    listen 80;
    server_name yourcustomproxy.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourcustomproxy.com;

    ssl_certificate /etc/letsencrypt/live/yourcustomproxy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourcustomproxy.com/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy to Python app
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket + streaming support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass real IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for SSE streaming
        proxy_buffering off;

        # Timeouts for long code generation
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Large payload support
        client_max_body_size 10m;
    }
}
